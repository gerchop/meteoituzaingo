<!DOCTYPE html>

<html lang="es">

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Meteo Ituzaingó</title>

</head>

<body>

<span id="cViento">--</span>

<span id="cDireccion">--</span>
</div>

<span id="cLluvia">--</span>
</div>

<div class="card">
<h3>🌡 Sensación</h3>
<span id="cST">--</span>
</div>

<span id="cPresion">--</span>
</div>
